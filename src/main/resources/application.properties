spring.application.name=notificationservice
server.port=${PORT:8085}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notificationservice
spring.kafka.consumer.auto-offset-reset=earliest

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Notification - AWS SES (disabled by default)
notification.ses.enabled=${SES_ENABLED:false}
notification.ses.from-email=${SES_FROM_EMAIL:}
notification.ses.region=${SES_REGION:ap-south-1}
notification.ses.to-email=${SES_TO_EMAIL:}
